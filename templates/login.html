<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveX Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#0b0b16;
            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .container{

            width:400px;

            background:#131323;

            padding:40px;

            border-radius:20px;

            box-shadow:0 0 25px rgba(0,0,0,.5);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input{

            width:100%;

            padding:14px;

            margin-bottom:15px;

            border:none;

            border-radius:10px;

            background:#1d1d33;

            color:white;
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:#6366F1;

            color:white;

            cursor:pointer;

            font-size:16px;
        }

        button:hover{

            opacity:.9;
        }

        a{

            color:#8b8fff;

            text-decoration:none;
        }

        .back{

            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>DriveX Login</h1>

    <form action="/login-user" method="POST">

        <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">

            Sign In

        </button>

    </form>

    <div class="back">

        <a href="/">← Back to Home</a>

    </div> 

</div>

</body>
</html>
