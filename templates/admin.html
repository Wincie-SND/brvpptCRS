<!DOCTYPE html>
<html lang="en" data-theme="admin">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    body { font-family: var(--font-body); background: var(--clr-bg); color: var(--clr-text); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* App Shell */
    .admin-shell { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .admin-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--clr-bg-2);
      border-right: 1px solid var(--clr-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .admin-sidebar-brand {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .admin-brand-icon {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    /* Topbar */
    .admin-topbar {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--clr-border);
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    /* Main */
    .admin-main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .admin-view { padding: 2rem; }

    /* Metrics row */
    .admin-metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .admin-metrics-row-2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }

    /* Chart bars (pure CSS) */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 120px;
      padding-top: 0.5rem;
    }

    .bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .bar {
      width: 100%;
      background: var(--clr-primary);
      border-radius: 4px 4px 0 0;
      transition: height var(--duration-slow) var(--ease-smooth);
      position: relative;
      min-height: 4px;
    }
    .bar:hover { filter: brightness(1.2); }
    .bar::after {
      content: attr(data-val);
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: var(--clr-text-3);
      white-space: nowrap;
    }
    .bar-label { font-size: 0.65rem; color: var(--clr-text-3); text-align: center; }

    /* Table wrap */
    .table-wrap {
      background: var(--clr-bg-2);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .table-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--clr-border);
      background: var(--clr-bg-3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Health indicators */
    .health-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .health-item {
      background: var(--clr-bg-2);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: 0.875rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .health-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .health-icon.ok  { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.2); }
    .health-icon.warn{ background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.2); }
    .health-icon.err { background: rgba(220,38,38,0.12);  border: 1px solid rgba(220,38,38,0.2); }

    /* Tenant cards */
    .tenant-card {
      background: var(--clr-bg-2);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: border-color var(--duration-base) var(--ease-smooth);
      position: relative;
      overflow: hidden;
    }
    .tenant-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--clr-primary), transparent);
    }
    .tenant-card:hover { border-color: var(--clr-primary-border); }

    @media (max-width: 1200px) {
      .admin-metrics-row { grid-template-columns: repeat(2, 1fr); }
      .admin-metrics-row-2 { grid-template-columns: repeat(2, 1fr); }
      .health-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  <script>
    // Render the growth chart and tenant cards after DB is accessible
    document.addEventListener('DOMContentLoaded', () => {
      // If admin page was NOT fail-secured, render additional widgets
      const checkAdmin = () => {
        const params = new URLSearchParams(window.location.search);
        const urlKey = params.get('key');
        if (!urlKey || !Session.isAdmin()) return;

        // Growth Chart (mock monthly data)
        const months = ['Jan','Feb','Mar','Apr','May','Jun'];
        const values = [1, 2, 2, 3, 4, 6]; // booking counts simulated
        const maxVal = Math.max(...values);
        const chartEl = document.getElementById('growthChart');
        const labelEl = document.getElementById('growthLabels');

        if (chartEl) {
          chartEl.innerHTML = values.map((v, i) => `
            <div class="bar-group">
              <div class="bar" style="height:${Math.round((v/maxVal)*100)}%" data-val="${v}"></div>
            </div>
          `).join('');
        }
        if (labelEl) {
          labelEl.innerHTML = months.map(m => `
            <span class="bar-label" style="flex:1;text-align:center">${m}</span>
          `).join('');
        }

        // Tenant cards
        const tenantCardsGrid = document.getElementById('tenantCardsGrid');
        if (tenantCardsGrid) {
          tenantCardsGrid.innerHTML = DB.tenants.map(t => {
            const staffCount = DB.users.filter(u => u.tenant_id === t.id).length;
            const bookCount  = DB.bookings.filter(b => b.tenant_id === t.id).length;
            const vehCount   = DB.vehicles.filter(v => v.tenant_id === t.id).length;
            const revenue    = DB.bookings.filter(b => b.tenant_id === t.id && b.status !== 'upcoming')
                                          .reduce((s, b) => s + b.totalAmount, 0);
            return `
              <div class="tenant-card animate-fade-in">
                <div class="flex items-center gap-3 mb-4">
                  <div class="avatar avatar-lg" style="background:rgba(220,38,38,0.1);color:var(--clr-primary-light)">
                    ${UI.getInitials(t.name)}
                  </div>
                  <div>
                    <h4 style="font-size:1rem;margin-bottom:2px">${t.name}</h4>
                    <p class="text-xs text-muted">${t.tagline}</p>
                    <div class="flex gap-2 mt-1">
                      <span class="badge badge-primary">${t.plan}</span>
                      ${UI.statusBadge(t.status)}
                    </div>
                  </div>
                </div>
                <div class="grid-2" style="gap:0.5rem">
                  <div style="background:var(--clr-bg-3);border-radius:var(--radius-sm);padding:0.75rem;text-align:center">
                    <div class="metric-value" style="font-size:1.4rem">${vehCount}</div>
                    <div class="metric-label" style="font-size:0.68rem">Vehicles</div>
                  </div>
                  <div style="background:var(--clr-bg-3);border-radius:var(--radius-sm);padding:0.75rem;text-align:center">
                    <div class="metric-value" style="font-size:1.4rem">${bookCount}</div>
                    <div class="metric-label" style="font-size:0.68rem">Bookings</div>
                  </div>
                  <div style="background:var(--clr-bg-3);border-radius:var(--radius-sm);padding:0.75rem;text-align:center">
                    <div class="metric-value" style="font-size:1.4rem">${staffCount}</div>
                    <div class="metric-label" style="font-size:0.68rem">Staff</div>
                  </div>
                  <div style="background:var(--clr-bg-3);border-radius:var(--radius-sm);padding:0.75rem;text-align:center">
                    <div class="metric-value" style="font-size:1.1rem">${UI.formatCurrency(t.subscriptionRevenue)}</div>
                    <div class="metric-label" style="font-size:0.68rem">MRR</div>
                  </div>
                </div>
                <hr class="divider mt-3">
                <div style="margin-top:0.75rem">
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-xs text-muted">Booking Revenue</span>
                    <span class="text-sm font-display font-bold" style="color:var(--clr-text)">${UI.formatCurrency(revenue)}</span>
                  </div>
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${bookCount > 0 ? '70' : '10'}%"></div>
                  </div>
                </div>
                <div class="mt-3">
                  <span class="badge badge-neutral font-mono" style="font-size:0.68rem">Key: ${t.key}</span>
                </div>
              </div>
            `;
          }).join('');
        }

        // Revenue analytics view
        const revBookEl = document.getElementById('rev_booking');
        const revSubEl  = document.getElementById('rev_sub');
        const revTotEl  = document.getElementById('rev_total');
        const m = DataStore.getGlobalMetrics();
        if (revBookEl) revBookEl.textContent = UI.formatCurrency(m.totalRevenue);
        if (revSubEl)  revSubEl.textContent  = UI.formatCurrency(m.subRevenue);
        if (revTotEl)  revTotEl.textContent  = UI.formatCurrency(m.saasRevenue);

        // Tenant revenue breakdown
        const trbEl = document.getElementById('tenantRevBreakdown');
        if (trbEl) {
          const maxTRev = Math.max(...DB.tenants.map(t =>
            DB.bookings.filter(b => b.tenant_id === t.id && b.status !== 'upcoming')
                       .reduce((s, b) => s + b.totalAmount, 0)
          ), 1);
          trbEl.innerHTML = DB.tenants.map(t => {
            const rev = DB.bookings.filter(b => b.tenant_id === t.id && b.status !== 'upcoming')
                                   .reduce((s, b) => s + b.totalAmount, 0);
            const pct = Math.round((rev / maxTRev) * 100);
            return `
              <div class="mb-4">
                <div class="flex items-center justify-between mb-1">
                  <div class="flex items-center gap-2">
                    <div class="avatar avatar-sm" style="background:rgba(220,38,38,0.1);color:var(--clr-primary-light);font-size:0.7rem">
                      ${UI.getInitials(t.name)}
                    </div>
                    <span class="text-sm" style="color:var(--clr-text)">${t.name}</span>
                  </div>
                  <span class="font-display font-bold text-sm" style="color:var(--clr-text)">${UI.formatCurrency(rev)}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${pct}%"></div>
                </div>
                <div class="flex items-center gap-2 mt-1">
                  <span class="badge badge-primary" style="font-size:0.65rem">${t.plan}</span>
                  <span class="text-xs text-muted">+ ${UI.formatCurrency(t.subscriptionRevenue)}/mo subscription</span>
                </div>
              </div>
            `;
          }).join('');
        }

        // Booking status breakdown
        const sbEl = document.getElementById('statusBreakdown');
        if (sbEl) {
          const statuses = ['active', 'completed', 'upcoming', 'cancelled'];
          sbEl.innerHTML = statuses.map(s => {
            const count = DB.bookings.filter(b => b.status === s).length;
            const pct   = Math.round((count / Math.max(DB.bookings.length, 1)) * 100);
            return `
              <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                  ${UI.statusBadge(s)}
                </div>
                <div class="flex items-center gap-2">
                  <div class="progress-bar" style="width:100px">
                    <div class="progress-fill" style="width:${pct}%"></div>
                  </div>
                  <span class="text-xs text-muted">${count} (${pct}%)</span>
                </div>
              </div>
            `;
          }).join('');
        }

        // Fleet utilization
        const fuEl = document.getElementById('fleetUtilization');
        if (fuEl) {
          fuEl.innerHTML = DB.tenants.map(t => {
            const vehicles  = DB.vehicles.filter(v => v.tenant_id === t.id);
            const available = vehicles.filter(v => v.available).length;
            const rented    = vehicles.length - available;
            const pct       = vehicles.length ? Math.round((rented / vehicles.length) * 100) : 0;
            return `
              <div class="mb-4">
                <div class="flex items-center justify-between mb-1">
                  <span class="text-sm" style="color:var(--clr-text)">${t.name}</span>
                  <span class="text-xs text-muted">${rented}/${vehicles.length} on rent</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${pct}%;background:var(--clr-primary)"></div>
                </div>
                <span class="text-xs text-muted">${pct}% occupancy rate</span>
              </div>
            `;
          }).join('');
        }

        // User count label
        const ucl = document.getElementById('userCountLabel');
        if (ucl) ucl.textContent = DB.users.length + ' accounts';
      };

      // Small delay to ensure app.js has mounted
      setTimeout(checkAdmin, 50);
    });
  </script>
</body>
</html>
